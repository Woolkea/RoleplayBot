services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lunar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lunar}
      POSTGRES_DB: ${POSTGRES_DB:-lunar}
    volumes:
      - lunar_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

volumes:
  lunar_pg_data:
